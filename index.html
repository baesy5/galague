<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>갤라그 GALAGA - 글로벌 리더보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    touch-action: none;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 4px;
    color: #fff;
    font-size: clamp(6px, 1.8vw, 10px);
    letter-spacing: 1px;
  }

  #hud .hud-group { display: flex; flex-direction: column; gap: 3px; }
  #hud .label { color: #f00; font-size: 0.75em; }
  #hud .label.global { color: #ff0; }
  #hud .value { color: #fff; }
  #hud .lives-icons { display: flex; gap: 4px; align-items: center; }

  canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
    border: 2px solid #333;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    pointer-events: none;
    background: rgba(0,0,0,0.6);
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(18px, 5vw, 36px);
    color: #ff0;
    text-shadow: 0 0 10px #ff0, 2px 2px 0 #a00;
    text-align: center;
    line-height: 1.4;
    letter-spacing: 3px;
  }

  .overlay-sub {
    font-size: clamp(7px, 2vw, 12px);
    color: #0f0;
    text-align: center;
    line-height: 2;
    animation: blink 1s step-end infinite;
  }

  .overlay-score {
    font-size: clamp(9px, 2.5vw, 13px);
    color: #0ff;
    text-align: center;
    line-height: 1.8;
    white-space: pre-line;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  #login-box {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #111;
    border: 3px solid #ff0;
    padding: 20px;
    width: 280px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 12px;
    color: #fff;
    font-size: 10px;
  }
  #login-box.hidden { display: none; }
  #login-box h2 { text-align: center; color: #ff0; margin-bottom: 5px; font-size: 14px; }
  #login-box input { 
    background: #000; border: 2px solid #555; color: #fff; 
    padding: 8px; font-family: 'Press Start 2P'; font-size: 10px; text-align: center;
  }
  #login-box input:focus { border-color: #0ff; outline: none; }
  #login-box button {
    background: #222; border: 2px solid #fff; color: #fff;
    padding: 8px; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer;
  }
  #login-box button:active { background: #fff; color: #000; }
  .login-toggle { text-align: center; color: #888; cursor: pointer; margin-top: 5px; text-decoration: underline; }

  #mobile-controls {
    display: none;
    width: 100%;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px 4px;
    gap: 8px;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 2.5vw, 12px);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ctrl-btn:active, .ctrl-btn.pressed {
    background: rgba(255,255,255,0.25);
    border-color: #ff0;
    color: #ff0;
  }

  .ctrl-move { display: flex; gap: 6px; }
  .btn-left, .btn-right { width: clamp(52px, 14vw, 70px); height: clamp(44px, 11vw, 58px); }
  .btn-fire {
    width: clamp(70px, 18vw, 90px); height: clamp(44px, 11vw, 58px);
    background: rgba(255,50,50,0.2); border-color: #f44; color: #f44;
  }
  .btn-fire:active, .btn-fire.pressed { background: rgba(255,50,50,0.45); border-color: #ff0; color: #ff0; }

  @media (hover: none) and (pointer: coarse) {
    #mobile-controls { display: flex; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div class="hud-group">
      <span class="label" id="user-label">SCORE</span>
      <span class="value" id="score-display">000000</span>
    </div>
    <div class="hud-group" style="align-items:center">
      <span class="label global" id="global-user-label">BEST: NONE</span>
      <span class="value" id="global-score-display">000000</span>
    </div>
    <div class="hud-group" style="align-items:flex-end">
      <span class="label">STAGE <span id="stage-display" style="color:#fff">1</span></span>
      <div class="lives-icons" id="lives-display"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="login-box">
    <h2 id="login-title">LOGIN</h2>
    <input type="text" id="login-id" placeholder="USER ID" maxlength="10">
    <input type="password" id="login-pw" placeholder="PASSWORD">
    <button id="btn-login-submit">SUBMIT</button>
    <div class="login-toggle" id="btn-login-toggle">NEED AN ACCOUNT? SIGNUP</div>
  </div>

  <div id="overlay" class="hidden">
    <div class="overlay-title" id="ov-title">GALAGA</div>
    <div class="overlay-score" id="ov-score"></div>
    <div class="overlay-sub" id="ov-sub">PRESS SPACE OR TAP TO START</div>
  </div>

  <div id="mobile-controls">
    <div class="ctrl-move">
      <button class="ctrl-btn btn-left" id="btn-left">◀</button>
      <button class="ctrl-btn btn-right" id="btn-right">▶</button>
    </div>
    <button class="ctrl-btn btn-fire" id="btn-fire">FIRE</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxLWASAwmwU3HAht0jB9bZSKvBbD6yJmrk91D_fDSfACJlXLVNvKYl-G2LJgCVPBfw/exec"; 

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovScore = document.getElementById('ov-score');
const ovSub = document.getElementById('ov-sub');
const scoreDisplay = document.getElementById('score-display');
const stageDisplay = document.getElementById('stage-display');
const livesDisplay = document.getElementById('lives-display');

const globalUserLabel = document.getElementById('global-user-label');
const globalScoreDisplay = document.getElementById('global-score-display');

const loginBox = document.getElementById('login-box');
const loginTitle = document.getElementById('login-title');
const loginIdInput = document.getElementById('login-id');
const loginPwInput = document.getElementById('login-pw');
const loginSubmitBtn = document.getElementById('btn-login-submit');
const loginToggleBtn = document.getElementById('btn-login-toggle');
const userLabel = document.getElementById('user-label');

const BASE_W = 400, BASE_H = 520;
let scale = 1, W = BASE_W, H = BASE_H;

function resize() {
  const maxW = Math.min(window.innerWidth - 8, 480);
  const maxH = window.innerHeight - 120;
  scale = Math.min(maxW / BASE_W, maxH / BASE_H, 1.5);
  W = Math.round(BASE_W * scale);
  H = Math.round(BASE_H * scale);
  canvas.width = W; canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  document.getElementById('game-wrapper').style.width = W + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); if(gameState !== 'playing') drawStars(); });

const S = (v) => v * scale;

let gameState = 'auth';
let isRegisterMode = false;
let currentUserId = "";

let score = 0, hiScore = 0, globalHiScore = 0, globalHiUser = "NONE", lives = 3, stage = 1;
let player, bullets, enemies, enemyBullets, particles, stars;
let frameCount = 0;
let stageTransitionTimer = 0;

const keys = {};
const mobileKeys = { left: false, right: false, fire: false };
let fireCooldown = 0;

document.addEventListener('keydown', e => {
  if(gameState === 'auth') return;
  keys[e.code] = true;
  if((e.code === 'Space' || e.code === 'Enter') && gameState !== 'playing' && gameState !== 'saving') startGame();
  if(e.code === 'Space') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function setupMobileBtn(id, key) {
  const btn = document.getElementById(id);
  const on = (e) => { e.preventDefault(); if(gameState==='playing') mobileKeys[key] = true; btn.classList.add('pressed'); };
  const off = (e) => { e.preventDefault(); mobileKeys[key] = false; btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart', on, { passive: false });
  btn.addEventListener('touchend', off, { passive: false });
}
setupMobileBtn('btn-left', 'left');
setupMobileBtn('btn-right', 'right');
setupMobileBtn('btn-fire', 'fire');

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if(gameState !== 'playing' && gameState !== 'auth' && gameState !== 'saving') startGame();
}, { passive: false });

loginToggleBtn.addEventListener('click', () => {
  isRegisterMode = !isRegisterMode;
  loginTitle.textContent = isRegisterMode ? "SIGN UP" : "LOGIN";
  loginToggleBtn.textContent = isRegisterMode ? "ALREADY HAVE AN ACCOUNT? LOGIN" : "NEED AN ACCOUNT? SIGNUP";
});

loginSubmitBtn.addEventListener('click', async () => {
  const id = loginIdInput.value.trim();
  const password = loginPwInput.value.trim();

  if(!id || !password) { alert("ID와 PASSWORD를 입력하세요."); return; }
  
  loginSubmitBtn.disabled = true;
  loginSubmitBtn.textContent = "WAIT...";

  try {
    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        action: isRegisterMode ? "register" : "login",
        id: id,
        password: password
      })
    });
    const result = await response.json();

    if(result.success) {
      if(isRegisterMode) {
        alert(result.message);
        isRegisterMode = false;
        loginTitle.textContent = "LOGIN";
        loginToggleBtn.textContent = "NEED AN ACCOUNT? SIGNUP";
      } else {
        currentUserId = result.id;
        hiScore = result.hiscore;
        globalHiScore = result.globalHiScore;
        globalHiUser = result.globalHiUser;
        
        userLabel.textContent = currentUserId.toUpperCase();
        loginBox.classList.add('hidden');
        showTitle();
      }
    } else {
      alert(result.message);
    }
  } catch (err) {
    alert("서버 연결에 실패했습니다. URL을 확인하세요.");
  } finally {
    loginSubmitBtn.disabled = false;
    loginSubmitBtn.textContent = "SUBMIT";
  }
});

function mkStars() {
  stars = [];
  for(let i = 0; i < 80; i++) {
    stars.push({ x: Math.random() * BASE_W, y: Math.random() * BASE_H, s: Math.random() * 1.5 + 0.3, spd: Math.random() * 0.4 + 0.1, b: Math.random() });
  }
}

function drawStars() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  stars.forEach(st => {
    ctx.globalAlpha = 0.4 + st.b * 0.6;
    ctx.fillStyle = '#fff';
    ctx.fillRect(st.x * scale, st.y * scale, S(st.s), S(st.s));
  });
  ctx.globalAlpha = 1;
}

function updateStars() {
  stars.forEach(st => {
    st.y += st.spd;
    if(st.y > BASE_H) { st.y = 0; st.x = Math.random() * BASE_W; }
    st.b = (Math.sin(frameCount * 0.05 + st.x) + 1) / 2;
  });
}

function drawPlayerShip(x, y, w, h) {
  ctx.fillStyle = '#5af';
  const cx = x + w/2;
  ctx.beginPath();
  ctx.moveTo(cx, y);
  ctx.lineTo(x + w*0.15, y + h);
  ctx.lineTo(x + w*0.35, y + h*0.65);
  ctx.lineTo(cx, y + h*0.8);
  ctx.lineTo(x + w*0.65, y + h*0.65);
  ctx.lineTo(x + w*0.85, y + h);
  ctx.closePath();
  ctx.fill();
}

function drawEnemy(e) {
  if(!e.alive) return;
  const x = e.x * scale, y = e.y * scale;
  const w = e.w * scale, h = e.h * scale;
  const cx = x + w/2, cy = y + h/2;

  if(e.type === 'boss') {
    ctx.fillStyle = e.phase === 2 ? '#f4f' : '#f80';
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.5, h*0.38, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.ellipse(cx, cy - h*0.1, w*0.28, h*0.26, 0, 0, Math.PI*2); ctx.fill();
  } else if(e.type === 'butterfly') {
    ctx.fillStyle = '#0af'; ctx.beginPath(); ctx.ellipse(cx, cy, w*0.22, h*0.32, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle = '#f44'; ctx.fillRect(x + w*0.2, y, w*0.6, h*0.5); ctx.fillRect(x, y + h*0.3, w, h*0.4);
  }
}

function spawnEnemies() {
  enemies = [];
  const cols = 10, rows = 4;
  const eW = 22, eH = 18, padX = 4;
  const totalW = cols * (eW + padX) - padX;
  const startX = (BASE_W - totalW) / 2;

  for(let r = 0; r < rows; r++) {
    for(let c = 0; c < cols; c++) {
      let type = r === 0 ? 'butterfly' : 'bee';
      enemies.push({
        x: startX + c*(eW+padX), y: 40 + r*24, w: eW, h: eH, type, alive: true,
        homeX: startX + c*(eW+padX), homeY: 40 + r*24,
        diveTimer: Math.random()*300 + 150 + r*60 + c*20,
        diving: false, diveAngle: 0, divePhase: 0, hp: 1, phase: 1
      });
    }
  }
  if(stage >= 3) {
    enemies.unshift({
      x: BASE_W/2 - 18, y: 20, w: 36, h: 28, type: 'boss', alive: true,
      homeX: BASE_W/2 - 18, homeY: 20, diveTimer: 200, diving: false, diveAngle: 0, divePhase: 0, hp: 2, phase: 1
    });
  }
}

function startGame() {
  score = 0; lives = 3; stage = 1; frameCount = 0;
  player = { x: BASE_W/2, y: BASE_H - 30, w: 20, h: 18, speed: 3.5, captured: false };
  bullets = []; enemyBullets = []; particles = [];
  fireCooldown = 0; stageTransitionTimer = 0;
  spawnEnemies();
  gameState = 'playing';
  overlay.classList.add('hidden');
  updateHUD();
  requestAnimationFrame(loop);
}

function nextStage() {
  stage++;
  bullets = []; enemyBullets = []; particles = [];
  stageTransitionTimer = 120;
  spawnEnemies();
  gameState = 'stageclear';
  stageDisplay.textContent = stage;
  ovTitle.textContent = 'STAGE ' + stage;
  ovScore.textContent = '';
  ovSub.textContent = 'GET READY!';
  overlay.classList.remove('hidden');
}

async function gameOver() {
  gameState = 'saving';
  ovTitle.textContent = 'GAME OVER';
  ovScore.textContent = 'SAVING SCORE...';
  ovSub.textContent = '';
  overlay.classList.remove('hidden');

  try {
    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "updateScore",
        id: currentUserId,
        score: score
      })
    });
    const result = await response.json();
    if(result.success) {
      hiScore = result.hiscore;
      globalHiScore = result.globalHiScore;
      globalHiUser = result.globalHiUser;

      if(score >= globalHiScore && score > 0) {
        ovScore.textContent = '👑 GLOBAL NEW RECORD! 👑\n' + String(score).padStart(6,'0');
      } else if(score > hiScore) {
        ovScore.textContent = 'NEW PERSONAL HIGH!\n' + String(score).padStart(6,'0');
      } else {
        ovScore.textContent = 'SCORE: ' + String(score).padStart(6,'0') + '\nMY HI: ' + String(hiScore).padStart(6,'0');
      }
    }
  } catch(e) {
    ovScore.textContent = 'SCORE: ' + String(score).padStart(6,'0') + '\n(SAVE FAILED)';
  } finally {
    gameState = 'gameover';
    ovSub.textContent = 'PRESS SPACE OR TAP';
    updateHUD();
  }
}

function showTitle() {
  gameState = 'title';
  ovTitle.textContent = 'GALAGA';
  ovScore.textContent = 'MY HI-SCORE: ' + String(hiScore).padStart(6,'0') + '\nGLOBAL BEST: ' + globalHiUser + ' (' + String(globalHiScore).padStart(6,'0') + ')';
  ovSub.textContent = 'PRESS SPACE OR TAP TO START';
  overlay.classList.remove('hidden');
  updateHUD();
}

function addParticle(x, y, color) {
  for(let i = 0; i < 8; i++) {
    const angle = (Math.PI*2/8)*i + Math.random()*0.4;
    const spd = Math.random()*2 + 1;
    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: 30, color });
  }
}

function updatePlayer() {
  if(player.captured) return;
  const spd = player.speed;
  if((keys['ArrowLeft'] || keys['KeyA'] || mobileKeys.left) && player.x > player.w/2) player.x -= spd;
  if((keys['ArrowRight'] || keys['KeyD'] || mobileKeys.right) && player.x < BASE_W - player.w/2) player.x += spd;

  fireCooldown--;
  if((keys['Space'] || keys['KeyZ'] || mobileKeys.fire) && fireCooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - player.h/2, w: 3, h: 10, spd: 8 });
    fireCooldown = 15;
