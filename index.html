<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>갤라그 GALAGA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    touch-action: none;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 4px;
    color: #fff;
    font-size: clamp(7px, 2vw, 11px);
    letter-spacing: 1px;
  }

  #hud .hud-group { display: flex; flex-direction: column; gap: 3px; }
  #hud .label { color: #f00; font-size: 0.75em; }
  #hud .value { color: #fff; }
  #hud .lives-icons { display: flex; gap: 4px; align-items: center; }

  canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
    border: 2px solid #333;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    pointer-events: none;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(18px, 5vw, 36px);
    color: #ff0;
    text-shadow: 0 0 10px #ff0, 2px 2px 0 #a00;
    text-align: center;
    line-height: 1.4;
    letter-spacing: 3px;
  }

  .overlay-sub {
    font-size: clamp(7px, 2vw, 12px);
    color: #0f0;
    text-align: center;
    line-height: 2;
    animation: blink 1s step-end infinite;
  }

  .overlay-score {
    font-size: clamp(9px, 2.5vw, 14px);
    color: #0ff;
    text-align: center;
    line-height: 2;
  }

  .overlay-stage {
    font-size: clamp(14px, 4vw, 28px);
    color: #ff0;
    text-align: center;
    letter-spacing: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  #mobile-controls {
    display: none;
    width: 100%;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px 4px;
    gap: 8px;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 2.5vw, 12px);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ctrl-btn:active, .ctrl-btn.pressed {
    background: rgba(255,255,255,0.25);
    border-color: #ff0;
    color: #ff0;
  }

  .ctrl-move {
    display: flex;
    gap: 6px;
  }

  .btn-left, .btn-right {
    width: clamp(52px, 14vw, 70px);
    height: clamp(44px, 11vw, 58px);
  }

  .btn-fire {
    width: clamp(70px, 18vw, 90px);
    height: clamp(44px, 11vw, 58px);
    background: rgba(255,50,50,0.2);
    border-color: #f44;
    color: #f44;
  }

  .btn-fire:active, .btn-fire.pressed {
    background: rgba(255,50,50,0.45);
    border-color: #ff0;
    color: #ff0;
  }

  @media (hover: none) and (pointer: coarse) {
    #mobile-controls { display: flex; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div class="hud-group">
      <span class="label">SCORE</span>
      <span class="value" id="score-display">000000</span>
    </div>
    <div class="hud-group" style="align-items:center">
      <span class="label">STAGE</span>
      <span class="value" id="stage-display">1</span>
    </div>
    <div class="hud-group" style="align-items:flex-end">
      <span class="label">LIVES</span>
      <div class="lives-icons" id="lives-display"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="overlay">
    <div class="overlay-title" id="ov-title">GALAGA</div>
    <div class="overlay-score" id="ov-score"></div>
    <div class="overlay-sub" id="ov-sub">PRESS SPACE OR TAP TO START</div>
  </div>

  <div id="mobile-controls">
    <div class="ctrl-move">
      <button class="ctrl-btn btn-left" id="btn-left">◀</button>
      <button class="ctrl-btn btn-right" id="btn-right">▶</button>
    </div>
    <button class="ctrl-btn btn-fire" id="btn-fire">FIRE</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovScore = document.getElementById('ov-score');
const ovSub = document.getElementById('ov-sub');
const scoreDisplay = document.getElementById('score-display');
const stageDisplay = document.getElementById('stage-display');
const livesDisplay = document.getElementById('lives-display');

const BASE_W = 400, BASE_H = 520;
let scale = 1, W = BASE_W, H = BASE_H;

function resize() {
  const maxW = Math.min(window.innerWidth - 8, 480);
  const maxH = window.innerHeight - 120;
  scale = Math.min(maxW / BASE_W, maxH / BASE_H, 1.5);
  W = Math.round(BASE_W * scale);
  H = Math.round(BASE_H * scale);
  canvas.width = W; canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  document.getElementById('game-wrapper').style.width = W + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); if(gameState !== 'playing') drawStars(); });

const S = (v) => v * scale;

let gameState = 'title';
let score = 0, hiScore = 0, lives = 3, stage = 1;
let player, bullets, enemies, enemyBullets, particles, stars;
let frameCount = 0, lastTime = 0;
let stageTransitionTimer = 0;
let bossActive = false;

const keys = {};
const mobileKeys = { left: false, right: false, fire: false };
let fireCooldown = 0;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if((e.code === 'Space' || e.code === 'Enter') && gameState !== 'playing') startGame();
  if(e.code === 'Space') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function setupMobileBtn(id, key) {
  const btn = document.getElementById(id);
  const on = (e) => { e.preventDefault(); mobileKeys[key] = true; btn.classList.add('pressed'); };
  const off = (e) => { e.preventDefault(); mobileKeys[key] = false; btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart', on, { passive: false });
  btn.addEventListener('touchend', off, { passive: false });
  btn.addEventListener('mousedown', on);
  btn.addEventListener('mouseup', off);
}
setupMobileBtn('btn-left', 'left');
setupMobileBtn('btn-right', 'right');
setupMobileBtn('btn-fire', 'fire');

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if(gameState !== 'playing') startGame();
}, { passive: false });

function mkStars() {
  stars = [];
  for(let i = 0; i < 80; i++) {
    stars.push({ x: Math.random() * BASE_W, y: Math.random() * BASE_H, s: Math.random() * 1.5 + 0.3, spd: Math.random() * 0.4 + 0.1, b: Math.random() });
  }
}

function drawStars() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  stars.forEach(st => {
    ctx.globalAlpha = 0.4 + st.b * 0.6;
    ctx.fillStyle = '#fff';
    ctx.fillRect(st.x * scale, st.y * scale, S(st.s), S(st.s));
  });
  ctx.globalAlpha = 1;
}

function updateStars() {
  stars.forEach(st => {
    st.y += st.spd;
    if(st.y > BASE_H) { st.y = 0; st.x = Math.random() * BASE_W; }
    st.b = (Math.sin(frameCount * 0.05 + st.x) + 1) / 2;
  });
}

function drawPlayerShip(x, y, w, h, color) {
  ctx.fillStyle = color || '#5af';
  const cx = x + w/2;
  ctx.beginPath();
  ctx.moveTo(cx, y);
  ctx.lineTo(x + w*0.15, y + h);
  ctx.lineTo(x + w*0.35, y + h*0.65);
  ctx.lineTo(cx, y + h*0.8);
  ctx.lineTo(x + w*0.65, y + h*0.65);
  ctx.lineTo(x + w*0.85, y + h);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#9ef';
  ctx.fillRect(cx - S(2), y + S(2), S(4), S(6));
  ctx.fillStyle = '#f80';
  ctx.fillRect(x + w*0.25, y + h*0.85, S(3), S(4));
  ctx.fillRect(x + w*0.65, y + h*0.85, S(3), S(4));
}

function drawEnemy(e) {
  if(!e.alive) return;
  const x = e.x * scale, y = e.y * scale;
  const w = e.w * scale, h = e.h * scale;
  const cx = x + w/2, cy = y + h/2;

  if(e.type === 'boss') {
    ctx.fillStyle = e.phase === 2 ? '#f4f' : '#f80';
    ctx.beginPath();
    ctx.ellipse(cx, cy, w*0.5, h*0.38, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ff0';
    ctx.beginPath();
    ctx.ellipse(cx, cy - h*0.1, w*0.28, h*0.26, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(cx - w*0.1, cy - h*0.08, w*0.07, h*0.07, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + w*0.1, cy - h*0.08, w*0.07, h*0.07, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f00';
    const wingY = cy + h*0.1;
    ctx.beginPath();
    ctx.moveTo(x, wingY);
    ctx.lineTo(x + w*0.22, wingY - h*0.2);
    ctx.lineTo(x + w*0.35, wingY + h*0.2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + w, wingY);
    ctx.lineTo(x + w*0.78, wingY - h*0.2);
    ctx.lineTo(x + w*0.65, wingY + h*0.2);
    ctx.closePath();
    ctx.fill();
    if(e.phase === 2) {
      ctx.strokeStyle = '#f00';
      ctx.lineWidth = S(1.5);
      ctx.beginPath();
      ctx.ellipse(cx, cy, w*0.52, h*0.4, 0, 0, Math.PI*2);
      ctx.stroke();
    }
  } else if(e.type === 'butterfly') {
    ctx.fillStyle = e.captured ? '#0f0' : '#0af';
    ctx.beginPath();
    ctx.ellipse(cx, cy, w*0.22, h*0.32, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = (e.captured ? '#0f0' : '#0af') + '88';
    ctx.beginPath();
    ctx.ellipse(cx - w*0.35, cy, w*0.3, h*0.26, -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + w*0.35, cy, w*0.3, h*0.26, 0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - w*0.08, cy - h*0.1, S(2), 0, Math.PI*2);
    ctx.arc(cx + w*0.08, cy - h*0.1, S(2), 0, Math.PI*2);
    ctx.fill();
  } else {
    ctx.fillStyle = '#f44';
    ctx.fillRect(x + w*0.2, y, w*0.6, h*0.5);
    ctx.fillRect(x, y + h*0.3, w, h*0.4);
    ctx.fillStyle = '#fa0';
    ctx.fillRect(x + w*0.3, y + h*0.1, w*0.4, h*0.3);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + w*0.35, y + h*0.15, S(3), S(3));
    ctx.fillRect(x + w*0.55, y + h*0.15, S(3), S(3));
  }
}

function spawnEnemies() {
  enemies = [];
  const cols = 10, rows = 4;
  const eW = 22, eH = 18, padX = 4;
  const totalW = cols * (eW + padX) - padX;
  const startX = (BASE_W - totalW) / 2;

  for(let r = 0; r < rows; r++) {
    for(let c = 0; c < cols; c++) {
      let type = r === 0 ? 'butterfly' : 'bee';
      enemies.push({
        x: startX + c*(eW+padX), y: 40 + r*24,
        w: eW, h: eH, type, alive: true,
        homeX: startX + c*(eW+padX), homeY: 40 + r*24,
        diveTimer: Math.random()*300 + 150 + r*60 + c*20,
        diving: false, diveAngle: 0, diveX: 0, diveY: 0, divePhase: 0,
        captured: false, hp: 1, phase: 1,
        animTick: Math.floor(Math.random()*30)
      });
    }
  }
  if(stage >= 3) {
    const boss = {
      x: BASE_W/2 - 18, y: 20, w: 36, h: 28,
      type: 'boss', alive: true,
      homeX: BASE_W/2 - 18, homeY: 20,
      diveTimer: 200, diving: false, diveAngle: 0,
      diveX: 0, diveY: 0, divePhase: 0,
      captured: false, hp: 2, phase: 1, animTick: 0
    };
    enemies.unshift(boss);
    bossActive = true;
  } else {
    bossActive = false;
  }
}

function startGame() {
  score = 0; lives = 3; stage = 1; frameCount = 0;
  player = { x: BASE_W/2, y: BASE_H - 30, w: 20, h: 18, speed: 3.5, captured: false, captureTimer: 0 };
  bullets = []; enemyBullets = []; particles = [];
  fireCooldown = 0; stageTransitionTimer = 0;
  spawnEnemies();
  gameState = 'playing';
  overlay.classList.add('hidden');
  updateHUD();
  requestAnimationFrame(loop);
}

function nextStage() {
  stage++;
  bullets = []; enemyBullets = []; particles = [];
  stageTransitionTimer = 120;
  spawnEnemies();
  gameState = 'stageclear';
  stageDisplay.textContent = stage;
  ovTitle.textContent = 'STAGE ' + stage;
  ovScore.textContent = '';
  ovSub.textContent = 'GET READY!';
  overlay.classList.remove('hidden');
}

function gameOver() {
  if(score > hiScore) hiScore = score;
  gameState = 'gameover';
  ovTitle.textContent = 'GAME OVER';
  ovScore.textContent = 'SCORE: ' + String(score).padStart(6,'0') + '\nHI: ' + String(hiScore).padStart(6,'0');
  ovSub.textContent = 'PRESS SPACE OR TAP';
  overlay.classList.remove('hidden');
}

function showTitle() {
  gameState = 'title';
  ovTitle.textContent = 'GALAGA';
  ovScore.textContent = hiScore > 0 ? 'HI-SCORE: ' + String(hiScore).padStart(6,'0') : '';
  ovSub.textContent = 'PRESS SPACE OR TAP TO START';
  overlay.classList.remove('hidden');
}

function addParticle(x, y, color) {
  for(let i = 0; i < 8; i++) {
    const angle = (Math.PI*2/8)*i + Math.random()*0.4;
    const spd = Math.random()*2 + 1;
    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: 30+Math.random()*20, color });
  }
}

function updatePlayer(dt) {
  if(player.captured) {
    player.captureTimer--;
    if(player.captureTimer <= 0) { lives--; updateHUD(); if(lives <= 0) { gameOver(); return; } player.captured = false; player.x = BASE_W/2; player.y = BASE_H - 30; }
    return;
  }
  const spd = S(player.speed) / scale;
  if((keys['ArrowLeft'] || keys['KeyA'] || mobileKeys.left) && player.x > player.w/2) player.x -= spd;
  if((keys['ArrowRight'] || keys['KeyD'] || mobileKeys.right) && player.x < BASE_W - player.w/2) player.x += spd;

  fireCooldown--;
  if((keys['Space'] || keys['KeyZ'] || mobileKeys.fire) && fireCooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - player.h/2, w: 3, h: 10, spd: 8 });
    fireCooldown = 15;
  }
}

function updateBullets() {
  bullets = bullets.filter(b => {
    b.y -= b.spd;
    return b.y > -10;
  });
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.y < BASE_H + 10 && b.x > -10 && b.x < BASE_W + 10;
  });
}

function updateEnemies() {
  const alive = enemies.filter(e => e.alive);
  if(alive.length === 0) { nextStage(); return; }

  const swing = Math.sin(frameCount * 0.018) * (20 + stage * 4);
  const swingY = Math.sin(frameCount * 0.009) * 6;

  enemies.forEach(e => {
    if(!e.alive) return;
    e.animTick++;

    if(!e.diving) {
      e.x = e.homeX + swing;
      e.y = e.homeY + swingY;
      e.diveTimer--;
      if(e.diveTimer <= 0) {
        e.diving = true; e.divePhase = 0;
        e.diveAngle = Math.atan2(player.y - e.y, player.x - e.x);
        e.diveX = e.x; e.diveY = e.y;
        e.diveTimer = 0;
      }
      if(Math.random() < 0.002 + stage*0.0005) {
        const spd = 2 + Math.random() * 1.5;
        const angle = Math.atan2(player.y - e.y, player.x - e.x) + (Math.random()-0.5)*0.5;
        enemyBullets.push({ x: e.x + e.w/2, y: e.y + e.h, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, w:4, h:8 });
      }
    } else {
      const spd = 2.5 + stage * 0.3;
      if(e.divePhase === 0) {
        e.diveAngle = Math.atan2(player.y - e.y, player.x - e.x) * 0.05 + e.diveAngle * 0.95;
        e.x += Math.cos(e.diveAngle) * spd;
        e.y += Math.sin(e.diveAngle) * spd;
        if(e.y > BASE_H + 30) { e.divePhase = 1; e.x = e.x < BASE_W/2 ? -30 : BASE_W + 30; e.y = e.homeY - 60; }
      } else {
        const tx = e.homeX, ty = e.homeY;
        const dx = tx - e.x, dy = ty - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 6) { e.x = e.homeX; e.y = e.homeY; e.diving = false; e.diveTimer = 120 + Math.random()*200; }
        else { e.x += dx/dist * spd * 1.5; e.y += dy/dist * spd * 1.5; }
      }
    }
  });
}

function checkCollisions() {
  bullets.forEach(b => {
    if(!b) return;
    enemies.forEach(e => {
      if(!e.alive) return;
      const bx = b.x * scale, by = b.y * scale;
      const ex = e.x * scale, ey = e.y * scale;
      if(bx > ex && bx < ex + e.w*scale && by > ey && by < ey + e.h*scale) {
        e.hp--;
        if(e.hp <= 0) {
          e.alive = false;
          const pts = e.type==='boss'?400:e.type==='butterfly'?160:80;
          score += pts * (e.diving?2:1);
          addParticle(e.x+e.w/2, e.y+e.h/2, e.type==='boss'?'#f80':e.type==='butterfly'?'#0af':'#f44');
          updateHUD();
        } else if(e.type==='boss') { e.phase = 2; }
        b.dead = true;
      }
    });
  });
  bullets = bullets.filter(b => !b.dead);

  if(!player.captured) {
    enemyBullets.forEach((b,i) => {
      const bx = b.x, by = b.y;
      const px = player.x - player.w/2, py = player.y - player.h/2;
      if(bx > px && bx < px + player.w && by > py && by < py + player.h) {
        b.dead = true;
        addParticle(player.x, player.y, '#5af');
        lives--; updateHUD();
        if(lives <= 0) { gameOver(); return; }
        player.x = BASE_W/2; player.y = BASE_H - 30;
      }
    });
    enemyBullets = enemyBullets.filter(b => !b.dead);

    enemies.forEach(e => {
      if(!e.alive || !e.diving) return;
      const ex = e.x, ey = e.y;
      const px = player.x - player.w/2, py = player.y - player.h/2;
      if(ex + e.w > px && ex < px + player.w && ey + e.h > py && ey < py + player.h) {
        addParticle(player.x, player.y, '#5af');
        lives--; updateHUD();
        if(lives <= 0) { gameOver(); }
        else { player.x = BASE_W/2; player.y = BASE_H - 30; e.diving = false; e.diveTimer = 180; e.x = e.homeX; e.y = e.homeY; }
      }
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vx *= 0.93; p.vy *= 0.93; p.life--;
    return p.life > 0;
  });
}

function draw() {
  drawStars();

  enemies.forEach(e => { if(e.alive) drawEnemy(e); });

  if(!player.captured) {
    drawPlayerShip(
      (player.x - player.w/2) * scale,
      (player.y - player.h) * scale,
      player.w * scale, player.h * scale
    );
  }

  ctx.fillStyle = '#ff0';
  bullets.forEach(b => {
    ctx.fillRect((b.x - b.w/2)*scale, (b.y - b.h)*scale, b.w*scale, b.h*scale);
  });

  enemyBullets.forEach(b => {
    ctx.fillStyle = '#f44';
    ctx.fillRect((b.x - b.w/2)*scale, (b.y - b.h/2)*scale, b.w*scale, b.h*scale);
  });

  particles.forEach(p => {
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x*scale - S(2), p.y*scale - S(2), S(4), S(4));
  });
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#333';
  ctx.fillRect(0, H - S(1), W, S(1));
}

function updateHUD() {
  scoreDisplay.textContent = String(score).padStart(6,'0');
  stageDisplay.textContent = stage;
  livesDisplay.innerHTML = '';
  for(let i = 0; i < lives; i++) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', Math.round(S(12)));
    svg.setAttribute('height', Math.round(S(12)));
    svg.setAttribute('viewBox','0 0 12 12');
    svg.innerHTML = '<polygon points="6,0 2,12 4.5,8 6,10 7.5,8 9.5,12" fill="#5af"/>';
    livesDisplay.appendChild(svg);
  }
}

let animId;
function loop(ts) {
  if(gameState !== 'playing' && gameState !== 'stageclear') return;
  frameCount++;

  if(gameState === 'stageclear') {
    stageTransitionTimer--;
    drawStars();
    updateStars();
    if(stageTransitionTimer <= 0) {
      gameState = 'playing';
      overlay.classList.add('hidden');
    }
    animId = requestAnimationFrame(loop);
    return;
  }

  updateStars();
  updatePlayer();
  updateBullets();
  updateEnemies();
  checkCollisions();
  updateParticles();
  draw();

  if(gameState === 'playing') animId = requestAnimationFrame(loop);
}

mkStars();
showTitle();
drawStars();

canvas.addEventListener('click', () => {
  if(gameState !== 'playing') startGame();
});
</script>
</body>
</html>
